<html lang="en">
  <head>
    <meta charset="UTF-8" />
    
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
    <link rel="apple-touch-icon" href="/favicon.svg?v=2" />
    
    <meta name="theme-color" content="#FFFFFF" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#111827" media="(prefers-color-scheme: dark)" />
    
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dentalix-frontend</title>
    <style>
      /* Regla Maestra para Modo Oscuro Dentalix */
      html.dark body { background-color: #111827 !important; color: #f9fafb !important; }
      html.dark .bg-white, html.dark .bg-surface { background-color: #1f2937 !important; border-color: #374151 !important; }
      html.dark .bg-background { background-color: #111827 !important; }
      html.dark .text-dark { color: #f9fafb !important; }
      html.dark .text-muted { color: #9ca3af !important; }
      html.dark .border-gray-100, html.dark .border-gray-200 { border-color: #374151 !important; }
      html.dark .bg-gray-50 { background-color: #374151 !important; }
      html.dark input, html.dark textarea, html.dark select { 
        background-color: #111827 !important; 
        color: #f9fafb !important; 
        border-color: #4b5563 !important; 
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
